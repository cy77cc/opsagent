agent:
  id: "agent-local-001"
  name: "local-dev-agent"
  interval_seconds: 10
  shutdown_timeout_seconds: 30

server:
  listen_addr: "0.0.0.0:18080"

executor:
  timeout_seconds: 10
  max_output_bytes: 65536
  allowed_commands:
    - uptime
    - df
    - free
    - whoami
    - hostname
    - ip
    - ss

reporter:
  mode: "stdout" # stdout | http
  endpoint: ""
  timeout_seconds: 5
  retry_count: 3
  retry_interval_ms: 500

auth:
  enabled: false
  bearer_token: ""

prometheus:
  enabled: true
  path: "/metrics"
  protect_with_auth: false

plugin:
  enabled: false
  runtime_path: "./rust-runtime/target/release/opsagent-rust-runtime"
  socket_path: "/tmp/opsagent/plugin.sock"
  auto_start: true
  startup_timeout_seconds: 5
  request_timeout_seconds: 30
  max_concurrent_tasks: 4
  max_result_bytes: 8388608
  chunk_size_bytes: 262144
  sandbox_profile: "strict"

grpc:
  server_addr: "platform.example.com:443"
  enroll_token: ""
  mtls:
    cert_file: ""
    key_file: ""
    ca_file: ""
  heartbeat_interval_seconds: 15
  reconnect_initial_backoff_ms: 1000
  reconnect_max_backoff_ms: 30000
  cache_persist_path: ""

sandbox:
  enabled: false
  nsjail_path: "/usr/bin/nsjail"
  base_workdir: "/tmp/opsagent/sandbox"
  default_timeout_seconds: 30
  max_concurrent_tasks: 4
  cgroup_base_path: "/sys/fs/cgroup/opsagent"
  audit_log_path: "/var/log/opsagent/audit.log"
  policy:
    allowed_commands:
      - echo
      - ls
      - cat
      - grep
      - wc
    blocked_commands:
      - rm
      - mkfs
      - dd
    blocked_keywords:
      - "rm -rf /"
    allowed_interpreters:
      - bash
      - python3
    script_max_bytes: 65536
    shell_injection_check: true

collector:
  inputs:
    - type: cpu
      config:
        per_cpu: false
    - type: memory
      config: {}
    - type: disk
      config: {}
    - type: net
      config: {}
    - type: load
      config: {}
    - type: diskio
      config:
        # devices: ["sda", "nvme0n1"]
    - type: temp
      config: {}
    - type: gpu
      config:
        # bin_path: "/usr/bin/nvidia-smi"
    - type: connections
      config:
        # states: ["ESTABLISHED", "LISTEN"]
  processors: []
  aggregators: []
  outputs: []
