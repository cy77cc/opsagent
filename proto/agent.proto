syntax = "proto3";
package nodeagentx;
option go_package = "nodeagentx/internal/grpcclient/proto";

service AgentService {
  rpc Connect(stream AgentMessage) returns (stream PlatformMessage);
}

message AgentMessage {
  oneof payload {
    AgentRegistration registration = 1;
    Heartbeat heartbeat = 2;
    MetricBatch metrics = 3;
    ExecOutput exec_output = 4;
    ExecResult exec_result = 5;
    Ack ack = 6;
  }
}

message PlatformMessage {
  oneof payload {
    ExecuteCommand exec_command = 1;
    ExecuteScript exec_script = 2;
    CancelJob cancel_job = 3;
    ConfigUpdate config_update = 4;
    Ack ack = 5;
  }
}

message AgentRegistration {
  string agent_id = 1;
  string token = 2;
  AgentInfo agent_info = 3;
  repeated string capabilities = 4;
}

message AgentInfo {
  string hostname = 1;
  string os = 2;
  string arch = 3;
  string version = 4;
  int32 cpu_cores = 5;
  int64 memory_bytes = 6;
  int32 running_tasks = 7;
  int32 max_tasks = 8;
}

message Heartbeat {
  string agent_id = 1;
  int64 timestamp_ms = 2;
  string status = 3;
  AgentInfo agent_info = 4;
}

message MetricBatch {
  repeated Metric metrics = 1;
}

message Metric {
  string name = 1;
  map<string, string> tags = 2;
  repeated Field fields = 3;
  int64 timestamp_ms = 4;
  MetricType type = 5;
}

message Field {
  string key = 1;
  oneof value {
    double double_value = 2;
    int64 int_value = 3;
    string string_value = 4;
    bool bool_value = 5;
  }
}

enum MetricType {
  GAUGE = 0;
  COUNTER = 1;
  HISTOGRAM = 2;
}

message ExecuteCommand {
  string task_id = 1;
  string command = 2;
  repeated string args = 3;
  map<string, string> env = 4;
  int32 timeout_seconds = 5;
  SandboxConfig sandbox = 6;
}

message ExecuteScript {
  string task_id = 1;
  string interpreter = 2;
  string script = 3;
  repeated string args = 4;
  map<string, string> env = 5;
  int32 timeout_seconds = 6;
  SandboxConfig sandbox = 7;
}

message SandboxConfig {
  int32 memory_mb = 1;
  int32 cpu_quota_pct = 2;
  int32 max_pids = 3;
  string network_mode = 4;
  repeated string allowed_ips = 5;
  int32 max_output_kb = 6;
}

message ExecOutput {
  string task_id = 1;
  string stream = 2;
  bytes data = 3;
  int64 timestamp_ms = 4;
}

message ExecResult {
  string task_id = 1;
  int32 exit_code = 2;
  int64 duration_ms = 3;
  bool timed_out = 4;
  bool truncated = 5;
  bool killed = 6;
  ExecStats stats = 7;
}

message ExecStats {
  int64 peak_memory_bytes = 1;
  int64 cpu_time_user_ms = 2;
  int64 cpu_time_system_ms = 3;
  int32 process_count = 4;
  int64 bytes_written = 5;
  int64 bytes_read = 6;
}

message CancelJob {
  string task_id = 1;
  string reason = 2;
}

message ConfigUpdate {
  bytes config_yaml = 1;
  int64 version = 2;
}

message Ack {
  string ref_id = 1;
  bool success = 2;
  string error = 3;
}
